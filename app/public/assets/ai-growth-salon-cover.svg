      <stop offset="0.52" stop-color="#0b365e"/>
      <stop offset="1" stop-color="#0a7f8a"/>
    </linearGradient>
    <radialGradient id="glowA" cx="72%" cy="20%" r="45%">
      <stop offset="0" stop-color="#55f1ff" stop-opacity="0.62"/>
      <stop offset="0.5" stop-color="#55f1ff" stop-opacity="0.13"/>
      <stop offset="1" stop-color="#37e6ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="18%" cy="80%" r="52%">
      <stop offset="0" stop-color="#f0b84d" stop-opacity="0.42"/>
      <stop offset="0.6" stop-color="#f0b84d" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#f0b84d" stop-opacity="0"/>
