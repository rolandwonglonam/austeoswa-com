<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="益企AI+ AI重塑企业增长实战沙龙封面">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
